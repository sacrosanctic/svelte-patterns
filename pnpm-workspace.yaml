engineStrict: true
dedupePeers: true

minimumReleaseAge: 4320
blockExoticSubdeps: true
strictDepBuilds: true

trustPolicy: no-downgrade
trustPolicyExclude:
  - 'undici-types@6.21.0' # @types/node@22.19.20
  - 'chokidar@4.0.3' # svelte-check@4.6.0

allowBuilds:
  esbuild: true
  sharp: true

packages:
  - apps/*
  - packages/*

catalogs:
  build:
    publint: ^0.3.21
    vite: ^8.0.2
  lint:
    '@eslint/js': ^10.0.1
    eslint: ^10.2.0
    eslint-config-prettier: ^10.1.8
    eslint-plugin-jsonc: ^3.2.0
    eslint-plugin-perfectionist: ^5.7.0
    eslint-plugin-svelte: ^3.14.0
    knip: ^6.3.0
    prettier: ^3.8.1
    prettier-plugin-svelte: ^4.1.1
    prettier-plugin-tailwindcss: ^0.8.0
    typescript-eslint: ^8.54.0
  md:
    '@mdit/plugin-container': ^0.23.1
    '@mdit/plugin-snippet': ^0.23.1
    '@shikijs/markdown-exit': ^4.0.2
    '@sveltejs/enhanced-img': ^0.10.4
    markdown-it-anchor: ^9.2.0
    vite-plugin-svelte-md: ^0.6.0
  other:
    flexsearch: ^0.8.212
  script:
    ansis: ^4.2.0
    commander: ^14.0.3
  svelte:
    '@sveltejs/adapter-node': ^5.5.4
    '@sveltejs/adapter-vercel': ^6.3.1
    '@sveltejs/kit': ^2.66.0
    '@sveltejs/package': ^2.5.8
    '@sveltejs/vite-plugin-svelte': ^7.0.0
    svelte: ^5.56.0
    svelte-check: ^4.4.2
  tailwind:
    '@tailwindcss/forms': ^0.5.11
    '@tailwindcss/typography': ^0.5.19
    '@tailwindcss/vite': ^4.2.2
    tailwind-merge: ^3.5.0
    tailwindcss: ^4.2.2
  types:
    '@types/node': ^22
    globals: ^17.3.0
    typescript: ^6.0.2
  util:
    '@better-fetch/fetch': ^1.0.0
    mode-watcher: ^1.1.0
    valibot: ^1.3.1
    vite-plugin-devtools-json: ^1.0.0
    wellcrafted: 0.42.0
  ui:
    '@tanstack/svelte-hotkeys': ^0.10.0
  dev:
    sv-agentation: ^0.4.0
  icons:
    '@iconify-json/mdi': ^1.2.3
    unplugin-icons: ^23.0.1
  test:
    '@vitest/browser-playwright': ^4.1.9
    playwright: ^1.60.0
    vitest: ^4.1.9
    vitest-browser-svelte: ^2.1.1
  misc:
    lz-string: ^1.5.0
